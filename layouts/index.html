<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>xiaoma.cyou | M · Mi · Lenny</title>
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="description" content="M、Mi、Lenny 三个社区的一站式入口：社交发布、视频内容、技术社区。">
<style>
  :root {
    --bg: #0f1419;
    --surface: #161b22;
    --surface-soft: #121922;
    --line: rgba(83, 100, 113, 0.34);
    --text: #e7e9ea;
    --muted: #536471;
    --primary: #1d9bf0;
    --accent: #f91880;
    --radius: 12px;
    --space-16: 16px;
    --space-24: 24px;
    --space-32: 32px;
    --title-size: 20px;
    --body-size: 16px;
    --meta-size: 13px;
    --shadow: 0 10px 30px rgba(0, 0, 0, 0.26);
    --transition: 150ms ease;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "IBM Plex Sans", "PingFang SC", "Microsoft YaHei", sans-serif;
    color: var(--text);
    background:
      radial-gradient(980px 460px at 100% -20%, rgba(29, 155, 240, 0.12), transparent 62%),
      var(--bg);
    min-height: 100vh;
    font-size: var(--body-size);
    line-height: 1.6;
  }
  .container {
    width: min(680px, calc(100% - 32px));
    margin: var(--space-24) auto var(--space-32);
  }
  .top {
    border: 1px solid var(--line);
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: var(--space-16);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-16);
    position: sticky;
    top: 12px;
    z-index: 20;
  }
  .brand {
    font-size: var(--title-size);
    line-height: 1.3;
    font-weight: 700;
  }
  .nav {
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-16);
  }
  .nav a,
  .btn {
    text-decoration: none;
    color: var(--text);
    border: 1px solid var(--line);
    background: var(--surface-soft);
    border-radius: 999px;
    min-height: 36px;
    padding: 0 14px;
    font-size: var(--meta-size);
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition:
      background-color var(--transition),
      border-color var(--transition),
      color var(--transition),
      box-shadow var(--transition);
  }
  .nav a:hover,
  .btn:hover {
    background: rgba(231, 233, 234, 0.08);
  }
  .nav .entry.is-current,
  .btn.primary {
    border-color: var(--primary);
    background: var(--primary);
    color: #ffffff;
  }
  .nav .entry.is-current:hover,
  .btn.primary:hover {
    background: #188cd8;
  }

  .hero,
  .portal,
  .foot {
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: var(--surface);
    box-shadow: var(--shadow);
  }

  .hero {
    margin-top: var(--space-24);
    padding: var(--space-24);
  }
  .eyebrow {
    display: inline-flex;
    align-items: center;
    border-radius: 999px;
    border: 1px solid rgba(249, 24, 128, 0.48);
    background: rgba(249, 24, 128, 0.12);
    color: #ffcce6;
    padding: 0 12px;
    min-height: 30px;
    font-size: var(--meta-size);
    font-weight: 600;
  }
  .hero h1 {
    margin: var(--space-16) 0 0;
    font-size: var(--title-size);
    line-height: 1.3;
    font-weight: 700;
  }
  .hero-actions {
    margin-top: var(--space-24);
    display: flex;
    gap: var(--space-16);
  }

  .portal-grid {
    margin-top: var(--space-32);
    display: grid;
    grid-template-columns: 1fr;
    gap: var(--space-24);
  }
  .portal {
    padding: var(--space-24);
    display: grid;
    gap: var(--space-16);
  }
  .portal .icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    border: 1px solid rgba(29, 155, 240, 0.56);
    background: rgba(29, 155, 240, 0.14);
    color: #d6ecff;
    font-size: var(--body-size);
    font-weight: 700;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .portal h3 {
    margin: 0;
    font-size: var(--title-size);
    line-height: 1.3;
    font-weight: 700;
  }
  .portal p {
    margin: 0;
    color: var(--muted);
    font-size: var(--meta-size);
    line-height: 1.6;
    font-weight: 500;
  }

  .foot {
    margin-top: var(--space-24);
    padding: var(--space-16);
    color: var(--muted);
    font-size: var(--meta-size);
    line-height: 1.6;
    font-weight: 500;
  }

  @media (max-width: 640px) {
    .top {
      position: static;
    }
    .nav {
      gap: 12px;
    }
  }
</style>
</head>
<body>
<main class="container">
  <header class="top">
    <div class="brand">xiaoma.cyou</div>
    <nav class="nav">
      <a class="entry" href="/m.html">M</a>
      <a class="entry" href="/mi.html">Mi</a>
      <a class="entry" href="/lenny.html">Lenny</a>
      <a href="/profile.html" id="profileNav" style="display:none">我的资料</a>
      <a href="/admin.html" id="adminNav" style="display:none">控制台</a>
      <a href="/auth.html" id="loginNav">账号入口</a>
      <a href="#" id="logoutNav" style="display:none">退出账号</a>
    </nav>
  </header>

  <section class="hero">
    <span class="eyebrow">Community Hub</span>
    <h1>一个账号，连接 M、Mi、Lenny 三个公开社区。</h1>
    <div class="hero-actions">
      <a class="btn primary" href="/m.html">开始浏览社区</a>
    </div>
  </section>

  <section class="portal-grid">
    <article class="portal">
      <span class="icon">M</span>
      <h3>M 实时社交</h3>
      <p>作者、时间、正文和互动优先，适合高频表达与讨论。</p>
      <a class="btn" href="/m.html">进入 M</a>
    </article>

    <article class="portal">
      <span class="icon">Mi</span>
      <h3>Mi 视频社区</h3>
      <p>以视频正文和互动为主，适合教程、演示和创作分享。</p>
      <a class="btn" href="/mi.html">进入 Mi</a>
    </article>

    <article class="portal">
      <span class="icon">L</span>
      <h3>Lenny 技术社区</h3>
      <p>以技术内容与讨论沉淀为主，适合长期文章创作。</p>
      <a class="btn" href="/lenny.html">进入 Lenny</a>
    </article>
  </section>

  <section class="foot">按钮和卡片已统一为主按钮实心、次按钮描边，页面保持单列与固定间距。</section>
</main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/app-core.js"></script>
<script>
  window.XiaomaCore?.applyNavState();
</script>
</body>
</html>
