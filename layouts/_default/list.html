<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>{{ .Title }} | xiaoma.cyou</title>
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<style>
:root{--bg:#f8fafc;--text:#223149;--muted:#647592;--line:#dfe6f2;--card:#fff}
body{max-width:980px;margin:32px auto;padding:0 16px;font-family:"Nunito","PingFang SC","Microsoft YaHei",system-ui;background:var(--bg);color:var(--text)}
h1{margin:0 0 14px}
.item{border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin:12px 0;background:var(--card);box-shadow:0 10px 22px rgba(113,127,162,.10)}
a{color:#3d67a7;text-decoration:none}
small{color:var(--muted)}
.back{display:inline-flex;align-items:center;min-height:34px;padding:0 12px;border-radius:999px;border:1px solid var(--line);text-decoration:none;color:#526488;font-size:13px;font-weight:700;background:#fff}
</style>
</head>
<body>
<h1>{{ .Title }}</h1>
{{ range .Pages }}
<div class="item">
<h3><a href="{{ .RelPermalink }}">{{ .Title }}</a></h3>
<small>{{ .Date.Format "2006-01-02" }}</small>
</div>
{{ end }}
<p><a class="back" href="/">返回站点</a></p>
</body>
</html>
