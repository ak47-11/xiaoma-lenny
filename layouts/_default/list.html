<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>{{ .Title }} | xiaoma.cyou</title>
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="stylesheet" href="/css/app.css" />
</head>
<body class="app-page doc-page">
<main class="shell">
  <header class="top">
    <div class="brand">xiaoma.cyou</div>
    <nav class="nav">
      <a href="/">首页</a>
      <a href="/community.html">社区入口</a>
      <a href="/profile.html" id="profileNav" style="display:none">我的资料</a>
      <a href="/admin.html" id="adminNav" style="display:none">控制台</a>
      <a href="/auth.html" id="loginNav">账号入口</a>
      <a href="#" id="logoutNav" style="display:none">退出账号</a>
    </nav>
  </header>

  <section class="section doc-list-wrap">
    <h1>{{ .Title }}</h1>
    <div class="doc-list">
      {{ range .Pages }}
      <article class="card doc-list-item">
        <h3><a href="{{ .RelPermalink }}">{{ .Title }}</a></h3>
        <small>{{ .Date.Format "2006-01-02" }}</small>
      </article>
      {{ end }}
    </div>
  </section>
</main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/session-gate.js"></script>
<script src="/js/design-variants.js"></script>
</body>
</html>
