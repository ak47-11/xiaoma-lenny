<!doctype html>
<html lang="zh-CN">
<head><script src="/livereload.js?mindelay=10&amp;v=2&amp;port=1313&amp;path=livereload" data-no-instant defer></script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>注册与登录 | xiaoma.cyou</title>
  <style>
    :root{--bg:#030712;--card-bg:rgba(17,24,39,0.7);--border:rgba(56,189,248,0.15);--text:#f0f9ff;--muted:#94a3b8;--brand:#22d3ee;--brand2:#a78bfa;--brand3:#f472b6;--success:#34d399;--error:#f87171}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter','PingFang SC','Microsoft YaHei',system-ui;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
    
    .bg{position:fixed;inset:0;z-index:-1;overflow:hidden}
    .bg::before{content:'';position:absolute;width:200%;height:200%;top:-50%;left:-50%;background:radial-gradient(circle at 20% 80%,rgba(34,211,238,0.12) 0%,transparent 50%),radial-gradient(circle at 80% 20%,rgba(167,139,250,0.12) 0%,transparent 50%);animation:bgMove 20s ease-in-out infinite}
    @keyframes bgMove{0%,100%{transform:translate(0,0)}50%{transform:translate(-5%,-5%)}}
    
    .orb{position:absolute;border-radius:50%;filter:blur(60px);opacity:0.5;animation:float 8s ease-in-out infinite}
    .orb1{width:400px;height:400px;background:var(--brand);top:-100px;left:-100px;animation-delay:0s}
    .orb2{width:300px;height:300px;background:var(--brand2);bottom:-50px;right:-50px;animation-delay:-3s}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-30px)}}
    
    .wrap{width:min(440px,94%);margin:60px auto;padding:20px;position:relative;z-index:1}
    .card{background:var(--card-bg);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:24px;padding:40px;position:relative;overflow:hidden}
    .card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--brand),var(--brand2),transparent)}
    
    .glow{position:absolute;width:200px;height:200px;background:var(--brand);filter:blur(100px);opacity:0.15;border-radius:50%;top:-100px;right:-50px;pointer-events:none}
    
    h1{font-size:28px;text-align:center;margin-bottom:8px}
    .grad{background:linear-gradient(135deg,var(--brand),var(--brand2));-webkit-background-clip:text;background-clip:text;color:transparent}
    .muted{color:var(--muted);font-size:14px;text-align:center;margin-bottom:28px}
    
    .tabs{display:flex;gap:8px;margin-bottom:24px;background:rgba(0,0,0,0.3);padding:6px;border-radius:12px}
    .tab{flex:1;padding:10px;border:none;background:transparent;color:var(--muted);border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;transition:all 0.3s}
    .tab.active{color:var(--text);background:linear-gradient(135deg,rgba(34,211,238,0.2),rgba(167,139,250,0.2));box-shadow:0 2px 10px rgba(34,211,238,0.2)}
    
    .panel{display:none;animation:fadeIn 0.3s ease}
    .panel.active{display:block}
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    
    .field{margin-bottom:18px;position:relative}
    .field label{display:block;color:var(--muted);font-size:13px;margin-bottom:8px}
    .field input{width:100%;background:rgba(0,0,0,0.4);border:1px solid var(--border);color:var(--text);padding:14px 16px;border-radius:12px;outline:none;font-size:15px;transition:all 0.3s}
    .field input::placeholder{color:rgba(148,163,184,0.5)}
    .field input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(34,211,238,0.1)}
    
    .btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.3s;margin-bottom:12px}
    .btn.primary{background:linear-gradient(135deg,var(--brand),#06b6d4);color:#000;box-shadow:0 4px 20px rgba(34,211,238,0.3)}
    .btn.primary:hover{box-shadow:0 6px 30px rgba(34,211,238,0.4);transform:translateY(-1px)}
    .btn.primary:active{transform:scale(0.98)}
    .btn:disabled{opacity:0.5;cursor:not-allowed}
    
    .btn .spinner{width:18px;height:18px;border:2px solid transparent;border-top-color:currentColor;border-radius:50%;animation:spin 0.8s linear infinite;display:inline-block}
    @keyframes spin{to{transform:rotate(360deg)}}
    
    .status{margin-top:16px;padding:12px 16px;border-radius:10px;font-size:13px;background:rgba(0,0,0,0.3);border:1px solid var(--border);text-align:center}
    .status.ok{border-color:rgba(52,211,153,0.4);color:var(--success)}
    .status.err{border-color:rgba(248,113,113,0.4);color:var(--error)}
    
    .divider{display:flex;align-items:center;gap:16px;margin:20px 0;color:var(--muted);font-size:12px}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
    
    .link{color:var(--brand);text-decoration:none;font-size:13px}
    .link:hover{text-decoration:underline}
    .links{display:flex;justify-content:space-between;margin-top:8px}
    
    @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
  </style>
</head>
<body>
  <div class="bg">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
  </div>

  <div class="wrap">
    <div class="card glow">
      <h1><span class="grad">欢迎登录</span></h1>
      <p class="muted">登录后可查看专属内容与功能</p>

      <div class="tabs">
        <button class="tab active" data-tab="password">账号密码</button>
        <button class="tab" data-tab="otp">验证码登录</button>
      </div>

      <div id="panel-password" class="panel active">
        <div class="field">
          <label>邮箱</label>
          <input id="email" type="email" placeholder="your@email.com" />
        </div>
        <div class="field">
          <label>密码</label>
          <input id="password" type="password" placeholder="请输入密码" />
        </div>
        <button class="btn primary" id="loginBtn">
          <span class="btn-text">登录</span>
        </button>
        <div class="links">
          <a href="#" class="link" id="forgotLink">忘记密码？</a>
          <a href="#" class="link" id="registerLink">注册账号</a>
        </div>
      </div>

      <div id="panel-otp" class="panel">
        <div class="field">
          <label>邮箱 或 手机号</label>
          <input id="otpIdentity" type="text" placeholder="name@email.com 或 +86138..." />
        </div>
        <button class="btn primary" id="sendOtpBtn">
          <span class="btn-text">发送验证码</span>
        </button>
        <div class="field" style="margin-top:12px">
          <label>验证码</label>
          <input id="otpCode" type="text" placeholder="输入6位验证码" maxlength="6" />
        </div>
        <button class="btn primary" id="verifyOtpBtn">
          <span class="btn-text">验证登录</span>
        </button>
      </div>

      <div id="status" class="status">请选择登录方式</div>
    </div>
  </div>
