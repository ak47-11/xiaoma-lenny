<style>
:root{
--bg:#f8fafc;
--text:#223149;
--muted:#647592;
--line:#dfe6f2;
--card:#ffffff;
--brand:#86c7ff;
--brand2:#7ae4d0;
}
*{box-sizing:border-box}
body{
margin:0;
font-family:"Nunito","PingFang SC","Microsoft YaHei",system-ui,-apple-system,sans-serif;
color:var(--text);
background:
radial-gradient(1000px 500px at 10% -20%, rgba(134,199,255,.32), transparent 62%),
radial-gradient(1000px 500px at 100% -10%, rgba(122,228,208,.26), transparent 62%),
var(--bg);
}
.container{width:min(980px,92%);margin:20px auto 42px}
.top{
display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;
border:1px solid var(--line);border-radius:16px;padding:14px 16px;background:#fff;
box-shadow:0 8px 20px rgba(110,126,164,.10)
}
.brand{font-weight:900;letter-spacing:.3px}
.actions a{
display:inline-flex;align-items:center;min-height:34px;padding:0 12px;border-radius:999px;
border:1px solid var(--line);text-decoration:none;color:#526488;font-size:13px;font-weight:700;margin-left:8px;background:#fff;
}
.actions .primary{background:linear-gradient(100deg,var(--brand),var(--brand2));border:none;color:#223650}
.paper{
margin-top:14px;border:1px solid var(--line);border-radius:18px;padding:22px;background:var(--card);
box-shadow:0 12px 30px rgba(108,121,156,.12)
}
.content{line-height:1.9;font-size:16px;color:#2c3b56}
.content h1,.content h2,.content h3{line-height:1.35;color:#1f2d46}
.content h1{font-size:34px;margin-top:0}
.content h2{font-size:24px;margin-top:24px}
.content p{margin:12px 0}
.content ul,.content ol{padding-left:22px}
.content hr{border:none;border-top:1px solid #e6ecf6;margin:20px 0}
.content code{background:#f4f7fc;padding:2px 6px;border-radius:6px}
.content pre{background:#101826;color:#ecf2ff;padding:14px;border-radius:10px;overflow:auto}
@media (max-width:900px){.paper{padding:18px}}
</style>
</head>
