<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>登录 | xiaoma.cyou</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #161b22;
      --surface-soft: #121922;
      --line: rgba(83, 100, 113, 0.34);
      --text: #e7e9ea;
      --muted: #536471;
      --primary: #1d9bf0;
      --accent: #f91880;
      --radius: 12px;
      --space-16: 16px;
      --space-24: 24px;
      --space-32: 32px;
      --title-size: 20px;
      --body-size: 16px;
      --meta-size: 13px;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.26);
      --transition: 150ms ease;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "IBM Plex Sans", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(980px 460px at 100% -20%, rgba(29, 155, 240, 0.12), transparent 62%),
        var(--bg);
      font-size: var(--body-size);
      line-height: 1.6;
    }

    .shell {
      width: min(680px, calc(100% - 32px));
      margin: var(--space-24) auto var(--space-32);
      display: grid;
      gap: var(--space-24);
    }

    .hero,
    .panel,
    .session-bar,
    .status {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .hero,
    .panel {
      padding: var(--space-24);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 0 12px;
      border-radius: 999px;
      border: 1px solid rgba(249, 24, 128, 0.48);
      background: rgba(249, 24, 128, 0.12);
      color: #ffcce6;
      font-size: var(--meta-size);
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    h1,
    h2 {
      margin: 0;
      font-size: var(--title-size);
      line-height: 1.3;
      font-weight: 700;
    }

    h1 {
      margin-top: var(--space-16);
    }

    .sub {
      margin: 0;
      color: var(--muted);
      font-size: var(--meta-size);
      line-height: 1.6;
      font-weight: 500;
    }

    .hero-actions {
      margin-top: var(--space-24);
      display: flex;
      gap: var(--space-16);
    }

    .btn,
    .mini-btn,
    .status-link,
    .tab,
    .field input {
      transition:
        background-color var(--transition),
        border-color var(--transition),
        color var(--transition),
        box-shadow var(--transition);
    }

    .btn,
    .mini-btn,
    .status-link {
      border: 1px solid var(--line);
      border-radius: 999px;
      min-height: 36px;
      padding: 0 14px;
      font-size: var(--meta-size);
      font-weight: 600;
      background: var(--surface-soft);
      color: var(--text);
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: inherit;
    }

    .btn {
      width: 100%;
    }

    .btn:hover,
    .mini-btn:hover,
    .status-link:hover,
    .tab:hover {
      background: rgba(231, 233, 234, 0.08);
    }

    .btn.primary {
      border-color: var(--primary);
      background: var(--primary);
      color: #ffffff;
    }

    .btn.primary:hover {
      background: #188cd8;
    }

    .btn.secondary {
      border-style: solid;
    }

    .btn:disabled,
    .mini-btn:disabled {
      opacity: 0.62;
      cursor: not-allowed;
    }

    .panel {
      display: grid;
      gap: var(--space-16);
    }

    .session-bar {
      display: none;
      padding: var(--space-16);
      background: var(--surface-soft);
    }

    .session-text {
      font-size: var(--meta-size);
      line-height: 1.6;
      color: var(--muted);
    }

    .session-actions {
      margin-top: var(--space-16);
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-16);
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface-soft);
    }

    .tab {
      border: 1px solid transparent;
      border-radius: 999px;
      min-height: 36px;
      padding: 0 12px;
      background: transparent;
      color: var(--muted);
      font-size: var(--meta-size);
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }

    .tab.active {
      border-color: var(--line);
      background: var(--surface);
      color: var(--text);
    }

    .form-panel {
      display: none;
    }

    .form-panel.active {
      display: block;
    }

    .field {
      margin-top: var(--space-16);
    }

    .field label {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: var(--meta-size);
      line-height: 1.6;
      font-weight: 500;
    }

    .field input {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-soft);
      padding: 0 14px;
      color: var(--text);
      font: inherit;
      outline: none;
    }

    .field input::placeholder {
      color: var(--muted);
      opacity: 0.9;
    }

    .field input:focus {
      border-color: rgba(29, 155, 240, 0.66);
      box-shadow: 0 0 0 1px rgba(29, 155, 240, 0.2);
    }

    .actions {
      margin-top: var(--space-16);
      display: grid;
      gap: var(--space-16);
    }

    .minor-links {
      margin-top: var(--space-16);
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-16);
    }

    .link-btn {
      border: none;
      padding: 0;
      background: transparent;
      color: var(--primary);
      font-size: var(--meta-size);
      line-height: 1.6;
      font-weight: 600;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 2px;
      font-family: inherit;
    }

    .inline-row {
      margin-top: var(--space-16);
      color: var(--muted);
      font-size: var(--meta-size);
      line-height: 1.6;
      font-weight: 500;
    }

    .status {
      min-height: 44px;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: var(--muted);
      font-size: var(--meta-size);
      line-height: 1.6;
      font-weight: 500;
      background: var(--surface-soft);
    }

    .status.ok {
      color: #d7ecff;
      border-color: rgba(29, 155, 240, 0.66);
      background: rgba(29, 155, 240, 0.14);
    }

    .status.err {
      color: #ffd5e8;
      border-color: rgba(249, 24, 128, 0.58);
      background: rgba(249, 24, 128, 0.14);
    }

    .status-action {
      display: none;
      justify-content: center;
    }

    .minimal-hidden {
      display: none !important;
    }

    @media (max-width: 640px) {
      .shell {
        width: calc(100% - 24px);
        margin: var(--space-16) auto var(--space-24);
      }

      .hero,
      .panel {
        padding: var(--space-16);
      }

      .tabs {
        grid-template-columns: 1fr;
      }
    }
  </style>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body class="app-page auth-page">
  <main class="shell">
    <section class="hero">
      <span class="badge">Xiaoma ID</span>
      <h1>登录后继续你的社区发布与互动。</h1>
      <p class="sub">密码登录为主路径，验证码保留为次级入口。</p>
      <div class="hero-actions">
        <a class="btn primary" href="/community.html">先浏览社区</a>
      </div>
    </section>

    <section class="panel">
      <h2>登录 xiaoma.cyou</h2>
      <p class="sub">输入邮箱和密码后点击主按钮即可继续。</p>

      <div id="sessionBar" class="session-bar"></div>

      <div class="tabs">
        <button class="tab active" data-tab="password" type="button">密码登录</button>
        <button class="tab" data-tab="otp" type="button">验证码（次级）</button>
      </div>

      <div id="panel-password" class="form-panel active">
        <div class="field">
          <label for="email">邮箱</label>
          <input type="email" id="email" placeholder="name@example.com" autocomplete="email" />
        </div>
        <div class="field">
          <label for="password">密码</label>
          <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password" />
        </div>
        <div class="field" id="registerOnlyField" style="display:none">
          <label for="passwordConfirm">确认密码（注册时）</label>
          <input type="password" id="passwordConfirm" placeholder="再次输入密码" autocomplete="new-password" />
        </div>

        <input class="minimal-hidden" type="checkbox" id="showPassword" />
        <input class="minimal-hidden" type="checkbox" id="rememberMe" checked />

        <div class="actions">
          <button class="btn primary" id="loginBtn" type="button">登录</button>
        </div>
        <div class="minor-links">
          <button class="link-btn" id="registerLink" type="button">创建账号</button>
          <button class="link-btn" id="forgotLink" type="button">忘记密码？</button>
        </div>
      </div>

      <div id="panel-otp" class="form-panel">
        <div class="field">
          <label for="otpIdentity" id="otpIdentityLabel">邮箱</label>
          <input type="text" id="otpIdentity" placeholder="name@example.com" autocomplete="username" />
        </div>
        <div class="actions">
          <button class="btn" id="sendOtpBtn" type="button">发送验证码</button>
          <button class="btn secondary" id="resendOtpBtn" type="button">重新发送</button>
        </div>
        <div class="field">
          <label for="otpCode">邮箱验证码</label>
          <input type="text" id="otpCode" placeholder="输入邮箱中的验证码" maxlength="12" autocomplete="one-time-code" />
        </div>
        <div class="field" id="resetPasswordField" style="display:none">
          <label for="resetNewPassword">新密码</label>
          <input type="password" id="resetNewPassword" placeholder="请输入新密码（至少6位）" autocomplete="new-password" />
        </div>
        <div class="field" id="resetPasswordConfirmField" style="display:none">
          <label for="resetNewPasswordConfirm">确认新密码</label>
          <input type="password" id="resetNewPasswordConfirm" placeholder="再次输入新密码" autocomplete="new-password" />
        </div>
        <div class="actions">
          <button class="btn primary" id="verifyOtpBtn" type="button">验证并登录</button>
        </div>
        <div class="inline-row">
          <span>收不到邮件？检查垃圾箱，或 60 秒后重发。</span>
        </div>
      </div>

      <div id="status" class="status">请输入邮箱和密码</div>
      <div id="statusAction" class="status-action"></div>
    </section>
  </main>
