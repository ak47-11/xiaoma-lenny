<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>登录 | xiaoma.cyou</title>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body class="app-page auth-page">
  <main class="shell">
    <section class="hero">
      <span class="badge">Xiaoma ID</span>
      <h1>登录后继续发布与互动。</h1>
      <p class="sub">主路径：邮箱 + 密码。验证码作为备用入口。</p>
      <div class="hero-actions">
        <a class="btn primary" href="/community.html">先浏览社区</a>
      </div>
    </section>

    <section class="panel">
      <h2>登录 xiaoma.cyou</h2>
      <p class="sub">输入账号信息后即可继续。</p>

      <div id="sessionBar" class="session-bar"></div>

      <div class="tabs">
        <button class="tab active" data-tab="password" type="button">密码登录</button>
        <button class="tab" data-tab="otp" type="button">验证码（备用）</button>
      </div>

      <div id="panel-password" class="form-panel active">
        <div class="field">
          <label for="email">邮箱</label>
          <input type="email" id="email" placeholder="name@example.com" autocomplete="email" />
        </div>
        <div class="field">
          <label for="password">密码</label>
          <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password" />
        </div>
        <div class="field" id="registerOnlyField" style="display:none">
          <label for="passwordConfirm">确认密码（注册时）</label>
          <input type="password" id="passwordConfirm" placeholder="再次输入密码" autocomplete="new-password" />
        </div>

        <input class="minimal-hidden" type="checkbox" id="showPassword" />
        <input class="minimal-hidden" type="checkbox" id="rememberMe" checked />

        <div class="actions">
          <button class="btn primary" id="loginBtn" type="button">登录</button>
        </div>
        <div class="minor-links">
          <button class="link-btn" id="registerLink" type="button">创建账号</button>
          <button class="link-btn" id="forgotLink" type="button">忘记密码？</button>
        </div>
      </div>

      <div id="panel-otp" class="form-panel">
        <div class="field">
          <label for="otpIdentity" id="otpIdentityLabel">邮箱</label>
          <input type="text" id="otpIdentity" placeholder="name@example.com" autocomplete="username" />
        </div>
        <div class="actions">
          <button class="btn" id="sendOtpBtn" type="button">发送验证码</button>
          <button class="btn secondary" id="resendOtpBtn" type="button">重新发送</button>
        </div>
        <div class="field">
          <label for="otpCode">邮箱验证码</label>
          <input type="text" id="otpCode" placeholder="输入邮箱中的验证码" maxlength="12" autocomplete="one-time-code" />
        </div>
        <div class="field" id="resetPasswordField" style="display:none">
          <label for="resetNewPassword">新密码</label>
          <input type="password" id="resetNewPassword" placeholder="请输入新密码（至少6位）" autocomplete="new-password" />
        </div>
        <div class="field" id="resetPasswordConfirmField" style="display:none">
          <label for="resetNewPasswordConfirm">确认新密码</label>
          <input type="password" id="resetNewPasswordConfirm" placeholder="再次输入新密码" autocomplete="new-password" />
        </div>
        <div class="actions">
          <button class="btn primary" id="verifyOtpBtn" type="button">验证并登录</button>
        </div>
        <div class="inline-row">
          <span>收不到邮件可检查垃圾箱，60 秒后可重发。</span>
        </div>
      </div>

      <div id="status" class="status">等待登录操作</div>
      <div id="statusAction" class="status-action"></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/design-variants.js"></script>

</body>
</html>
