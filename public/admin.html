<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>管理台 | xiaoma.cyou</title>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body class="app-page admin-page">
  <div class="container">
    <section class="top">
      <div class="title">
        <h1>社区管理台</h1>
        <p id="viewerText">正在验证登录状态...</p>
      </div>
      <div class="actions">
        <a class="link-btn" href="/">返回站点</a>
        <a class="link-btn" href="/community.html">社区入口</a>
        <button id="refreshBtn" class="primary">刷新数据</button>
        <button id="logoutBtn">退出登录</button>
      </div>
    </section>

    <div id="status" class="status">初始化中...</div>

    <section class="grid">
      <article class="card"><div class="label">帖子总数</div><div id="postCount" class="metric">-</div></article>
      <article class="card"><div class="label">评论总数</div><div id="commentCount" class="metric">-</div></article>
      <article class="card"><div class="label">用户总数</div><div id="userCount" class="metric">-</div></article>
      <article class="card"><div class="label">待审核条目</div><div id="queueCount" class="metric">-</div></article>
      <article class="card"><div class="label">操作日志数</div><div id="logCount" class="metric">-</div></article>
    </section>

    <section class="panels">
      <article class="card">
        <div class="head-row">
          <h2>帖子管理</h2>
          <span class="small">可删除违规/垃圾帖子</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>标题</th><th>作者</th><th>社区</th><th>时间</th><th>操作</th></tr>
            </thead>
            <tbody id="postTable"></tbody>
          </table>
        </div>
      </article>

      <article class="card">
        <div class="head-row">
          <h2>评论管理</h2>
          <span class="small">可删除违规评论</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>内容</th><th>作者</th><th>帖子ID</th><th>时间</th><th>操作</th></tr>
            </thead>
            <tbody id="commentTable"></tbody>
          </table>
        </div>
      </article>
    </section>

    <section class="panels">
      <article class="card">
        <div class="head-row">
          <h2>敏感词审核队列</h2>
          <span class="small">驳回或放行命中内容</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>内容摘要</th><th>原因</th><th>提交者</th><th>时间</th><th>操作</th></tr>
            </thead>
            <tbody id="queueTable"></tbody>
          </table>
        </div>
      </article>

      <article class="card">
        <div class="head-row">
          <h2>管理员操作日志</h2>
          <span class="small">记录删帖/删评/改角色/审核操作</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>操作者</th><th>动作</th><th>对象</th><th>详情</th><th>时间</th></tr>
            </thead>
            <tbody id="logTable"></tbody>
          </table>
        </div>
      </article>
    </section>

    <section class="panels">
      <article class="card" style="grid-column: 1 / -1;">
        <div class="head-row">
          <h2>用户角色管理</h2>
          <span class="small">支持 admin / moderator / user</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>用户ID</th><th>显示名</th><th>角色</th><th>操作</th></tr>
            </thead>
            <tbody id="userTable"></tbody>
          </table>
        </div>
      </article>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/design-variants.js"></script>
  <script src="/js/admin.js" data-supabase-url="https://vtplvtwbkyydxmcxgctn.supabase.co" data-supabase-anon-key="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ0cGx2dHdia3l5ZHhtY3hnY3RuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2MDI1NDYsImV4cCI6MjA4ODE3ODU0Nn0.JmmCCDbv9rkVSSCOfhrFwUgwzNMTvsDda_C956EjatU"></script>
</body>
</html>
