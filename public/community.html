<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>社区中心 | xiaoma.cyou</title>
  <link rel="stylesheet" href="/css/community.css" />
</head>
<body>
  <main class="app">
    <header class="hero">
      <div class="hero-blobs" aria-hidden="true">
        <span class="blob b1"></span>
        <span class="blob b2"></span>
        <span class="blob b3"></span>
      </div>
      <div>
        <span class="pill">Community Beta</span>
        <h1>三角洲讨论社区 + 充电社区</h1>
        <p>可爱统一画风，支持发帖、点赞、评论、收藏与图文视频动态。</p>
        <div class="mascot-row">
          <div class="mascot-card delta">
            <span class="emoji">🦊</span>
            <div><b>战术狐 Delta</b><small>带你冲战术与组队</small></div>
          </div>
          <div class="mascot-card charge">
            <span class="emoji">🐼</span>
            <div><b>电量熊 Charge</b><small>陪你发图文与视频</small></div>
          </div>
        </div>
        <div class="modes">
          <div class="mode delta">
            <b>三角洲讨论</b>
            <span>偏战术讨论、配装、组队与攻略</span>
          </div>
          <div class="mode charge">
            <b>充电社区</b>
            <span>偏日常分享、图文短视频与灵感记录</span>
          </div>
        </div>
      </div>
      <div class="hero-actions">
        <a class="back" href="/auth.html">登录账号</a>
        <a class="back" href="/">返回首页</a>
      </div>
    </header>

    <section class="switcher">
      <button class="tab active" data-tab="delta">三角洲讨论社区</button>
      <button class="tab" data-tab="charge">充电社区</button>
    </section>

    <section class="layout">
      <article class="composer card" id="composerArea"></article>

      <article class="feed card">
        <div class="feed-top">
          <h2 id="feedTitle">三角洲热帖</h2>
          <select id="sortBy">
            <option value="hot">按热度</option>
            <option value="latest">按最新</option>
          </select>
        </div>
        <div id="feedList" class="feed-list"></div>
      </article>

      <aside class="side card">
        <h3>我的信息</h3>
        <div id="viewerCard" class="viewer">未登录，当前为游客模式</div>
        <hr />
        <h3>通知中心</h3>
        <div id="noticeList" class="notice-list"></div>
        <hr />
        <h3>热门话题</h3>
        <div id="topics" class="topics"></div>
        <hr />
        <h3>社区提示</h3>
        <ul>
          <li>文明发言，拒绝人身攻击</li>
          <li>攻略建议带标签便于检索</li>
          <li>视频建议附 1 句摘要</li>
        </ul>
      </aside>
    </section>
  </main>

  <template id="postTemplate">
    <div class="post">
      <div class="post-head">
        <div>
          <b class="post-title"></b>
          <div class="meta"></div>
        </div>
        <span class="chip post-topic"></span>
      </div>
      <div class="author-line"></div>
      <p class="post-content"></p>
      <div class="media"></div>
      <div class="actions">
        <button class="act like-btn">❤ <span>0</span></button>
        <button class="act comment-toggle">💬 评论</button>
        <button class="act collect-btn">⭐ 收藏</button>
        <button class="act follow-btn">+ 关注作者</button>
      </div>
      <div class="comment-box hidden">
        <div class="comment-list"></div>
        <form class="comment-form">
          <input type="text" maxlength="200" placeholder="写下你的评论" required />
          <button type="submit">发送</button>
        </form>
      </div>
    </div>
  </template>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/community.js"></script>
</body>
</html>
