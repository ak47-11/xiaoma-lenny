<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OpenClaw 对话 | xiaoma.cyou</title>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <style>
    :root {
      --bg: #0d1117;
      --bg-soft: #111827;
      --panel: #161f2b;
      --panel-soft: #1b2634;
      --line: rgba(148, 163, 184, 0.24);
      --line-strong: rgba(148, 163, 184, 0.4);
      --text: #e5e7eb;
      --muted: #94a3b8;
      --primary: #1d9bf0;
      --primary-soft: rgba(29, 155, 240, 0.16);
      --danger-soft: rgba(249, 24, 128, 0.14);
      --radius: 14px;
      --shadow: 0 18px 42px rgba(0, 0, 0, 0.34);
      --transition: 150ms ease;
      --sidebar-width: 300px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      font-family: "IBM Plex Sans", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(920px 420px at 98% -10%, rgba(29, 155, 240, 0.18), transparent 62%),
        radial-gradient(860px 400px at -6% 110%, rgba(29, 155, 240, 0.07), transparent 66%),
        linear-gradient(180deg, #0d1117, #0f141c);
      overflow: hidden;
    }

    .chat-shell {
      width: min(1380px, calc(100% - 24px));
      margin: 12px auto;
      height: calc(100vh - 24px);
      display: grid;
      grid-template-columns: var(--sidebar-width) minmax(0, 1fr);
      gap: 12px;
    }

    .sidebar,
    .main {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(22, 31, 43, 0.95), rgba(18, 25, 35, 0.96));
      box-shadow: var(--shadow);
      min-height: 0;
    }

    .sidebar {
      padding: 14px;
      display: grid;
      grid-template-rows: auto auto auto auto minmax(0, 1fr);
      gap: 12px;
      overflow: hidden;
    }

    .brand {
      display: grid;
      gap: 4px;
      padding: 2px 2px 6px;
    }

    .brand strong {
      font-size: 20px;
      line-height: 1.25;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .brand span {
      font-size: 12px;
      line-height: 1.6;
      color: var(--muted);
    }

    .action-stack {
      display: grid;
      gap: 8px;
    }

    .btn,
    .thread-item,
    .composer textarea {
      transition:
        background-color var(--transition),
        border-color var(--transition),
        color var(--transition),
        box-shadow var(--transition),
        transform var(--transition);
    }

    .btn {
      min-height: 40px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(17, 24, 39, 0.86);
      color: var(--text);
      font-size: 13px;
      font-weight: 700;
      line-height: 1;
      padding: 0 14px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      user-select: none;
    }

    .btn:hover {
      background: rgba(229, 231, 235, 0.1);
      border-color: var(--line-strong);
    }

    .btn.primary {
      border-color: var(--primary);
      background: linear-gradient(100deg, #239cf0, #187ec6);
      color: #ffffff;
      box-shadow: 0 10px 24px rgba(29, 155, 240, 0.26);
    }

    .btn.primary:hover {
      background: linear-gradient(100deg, #32a6f3, #1c8cda);
      transform: translateY(-1px);
    }

    .config-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(17, 24, 39, 0.68);
      padding: 10px;
      display: grid;
      gap: 6px;
    }

    .config-card strong {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .hint {
      margin: 0;
      color: #cbd5e1;
      font-size: 12px;
      line-height: 1.65;
    }

    .threads-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 2px;
    }

    .threads-head strong {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .threads-head span {
      font-size: 11px;
      color: var(--muted);
    }

    .thread-list {
      margin: 0;
      padding: 0 4px 0 0;
      list-style: none;
      display: grid;
      gap: 8px;
      overflow: auto;
      align-content: start;
    }

    .thread-item {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(17, 24, 39, 0.72);
      color: var(--text);
      text-align: left;
      padding: 9px 10px;
      display: grid;
      gap: 4px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .thread-item strong {
      font-size: 13px;
      line-height: 1.45;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .thread-item span {
      font-size: 11px;
      line-height: 1.5;
      color: var(--muted);
    }

    .thread-item:hover {
      background: rgba(29, 155, 240, 0.1);
      border-color: rgba(29, 155, 240, 0.52);
    }

    .thread-item.active {
      border-color: rgba(29, 155, 240, 0.78);
      background: var(--primary-soft);
      box-shadow: 0 0 0 1px rgba(29, 155, 240, 0.24);
    }

    .thread-item.active::before {
      content: "";
      position: absolute;
      left: 0;
      top: 8px;
      bottom: 8px;
      width: 3px;
      border-radius: 999px;
      background: var(--primary);
    }

    .main {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      overflow: hidden;
    }

    .topbar {
      border-bottom: 1px solid var(--line);
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      background: rgba(16, 24, 37, 0.86);
      backdrop-filter: blur(8px);
    }

    .topbar h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.22;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .topbar p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.65;
    }

    .chat-feed {
      overflow: auto;
      padding: 22px 22px 16px;
      display: grid;
      gap: 14px;
      align-content: start;
      background:
        linear-gradient(180deg, rgba(13, 18, 26, 0.4), rgba(13, 18, 26, 0.74));
    }

    .welcome {
      border: 1px dashed var(--line-strong);
      border-radius: 14px;
      background: rgba(17, 24, 39, 0.68);
      padding: 14px;
      color: #cbd5e1;
      font-size: 13px;
      line-height: 1.8;
      max-width: min(900px, 100%);
    }

    .msg {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(17, 24, 39, 0.76);
      padding: 12px 14px;
      max-width: min(920px, 100%);
      box-shadow: 0 8px 26px rgba(0, 0, 0, 0.2);
      justify-self: start;
      display: grid;
      gap: 7px;
      animation: msg-enter 180ms ease both;
    }

    .msg.user {
      justify-self: end;
      border-color: rgba(29, 155, 240, 0.75);
      background: rgba(29, 155, 240, 0.16);
    }

    .msg.error {
      border-color: rgba(249, 24, 128, 0.6);
      background: var(--danger-soft);
    }

    .msg-head {
      font-size: 11px;
      line-height: 1.4;
      font-weight: 700;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      gap: 8px;
      letter-spacing: 0.01em;
      text-transform: uppercase;
    }

    .msg-body {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 15px;
      line-height: 1.75;
      color: var(--text);
    }

    .composer {
      border-top: 1px solid var(--line);
      background: rgba(16, 24, 37, 0.92);
      padding: 12px 16px 14px;
      display: grid;
      gap: 10px;
    }

    .composer textarea {
      width: 100%;
      min-height: 92px;
      max-height: 240px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(17, 24, 39, 0.86);
      color: var(--text);
      padding: 11px 12px;
      font: inherit;
      line-height: 1.72;
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02);
    }

    .composer textarea:focus {
      border-color: rgba(29, 155, 240, 0.78);
      box-shadow: 0 0 0 1px rgba(29, 155, 240, 0.26);
    }

    .composer-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .composer-tip {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.65;
    }

    .thread-list::-webkit-scrollbar,
    .chat-feed::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    .thread-list::-webkit-scrollbar-thumb,
    .chat-feed::-webkit-scrollbar-thumb {
      background: rgba(148, 163, 184, 0.34);
      border: 2px solid transparent;
      background-clip: padding-box;
      border-radius: 999px;
    }

    .thread-list::-webkit-scrollbar-track,
    .chat-feed::-webkit-scrollbar-track {
      background: transparent;
    }

    @keyframes msg-enter {
      from {
        opacity: 0;
        transform: translateY(5px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 1024px) {
      body {
        overflow: auto;
      }

      .chat-shell {
        width: calc(100% - 14px);
        margin: 7px auto;
        height: auto;
        min-height: calc(100vh - 14px);
        grid-template-columns: 1fr;
      }

      .sidebar {
        grid-template-rows: auto auto auto auto;
      }

      .thread-list {
        max-height: 200px;
      }

      .topbar {
        padding: 12px 14px;
      }

      .topbar h1 {
        font-size: 19px;
      }

      .chat-feed {
        padding: 14px;
      }

      .composer {
        padding: 10px 12px 12px;
      }
    }
  </style>
</head>
<body>
  <main class="chat-shell">
    <aside class="sidebar">
      <div class="brand">
        <strong>OpenClaw Chat</strong>
        <span>本地算力 · 站点代理</span>
      </div>

      <div class="action-stack">
        <button id="newChatBtn" class="btn primary" type="button">+ 新对话</button>
        <button id="configBtn" class="btn" type="button">接口设置</button>
        <a class="btn" href="/">返回门户</a>
      </div>

      <div class="config-card">
        <strong>当前配置</strong>
        <p id="modelHint" class="hint">模型：openclaw-agent · 未配置鉴权</p>
      </div>

      <div class="threads-head">
        <strong>历史会话</strong>
        <span>本地保存</span>
      </div>

      <ul id="threadList" class="thread-list"></ul>
    </aside>

    <section class="main">
      <header class="topbar">
        <div>
          <h1>OpenClaw 新界面</h1>
          <p>参考 ChatGPT 的会话布局：左侧会话管理，右侧多轮对话，底部输入发送。</p>
        </div>
        <button id="clearChatBtn" class="btn" type="button">清空当前对话</button>
      </header>

      <div id="chatFeed" class="chat-feed"></div>

      <form id="composerForm" class="composer">
        <textarea id="promptInput" maxlength="5000" placeholder="输入你的问题，Enter 发送，Shift + Enter 换行。"></textarea>
        <div class="composer-row">
          <span class="composer-tip">提示：首次使用先点“接口设置”填模型和 Bridge Token。</span>
          <button id="sendBtn" class="btn primary" type="submit">发送</button>
        </div>
      </form>
    </section>
  </main>

  <script src="/js/openclaw-chat.js"></script>
</body>
</html>
