<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>个人中心 | xiaoma.cyou</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #161b22;
      --surface-soft: #121922;
      --line: rgba(83, 100, 113, 0.34);
      --text: #e7e9ea;
      --muted: #536471;
      --primary: #1d9bf0;
      --accent: #f91880;
      --radius: 12px;
      --space-16: 16px;
      --space-24: 24px;
      --space-32: 32px;
      --title-size: 20px;
      --body-size: 16px;
      --meta-size: 13px;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.26);
      --transition: 150ms ease;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "IBM Plex Sans", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(980px 460px at 100% -20%, rgba(29, 155, 240, 0.12), transparent 62%),
        var(--bg);
      font-size: var(--body-size);
      line-height: 1.6;
    }

    .shell {
      width: min(680px, calc(100% - 32px));
      margin: var(--space-24) auto var(--space-32);
      display: grid;
      gap: var(--space-24);
    }

    .top,
    .card,
    .status {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .top,
    .card {
      padding: var(--space-24);
    }

    h1,
    h2 {
      margin: 0;
      font-size: var(--title-size);
      line-height: 1.3;
      font-weight: 700;
    }

    .sub {
      margin: var(--space-16) 0 0;
      color: var(--muted);
      font-size: var(--meta-size);
      line-height: 1.6;
      font-weight: 500;
    }

    .top {
      display: grid;
      gap: var(--space-16);
    }

    .nav {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-16);
    }

    .btn,
    .field input,
    .field textarea {
      transition:
        background-color var(--transition),
        border-color var(--transition),
        color var(--transition),
        box-shadow var(--transition);
    }

    .btn {
      border: 1px solid var(--line);
      border-radius: 999px;
      min-height: 36px;
      padding: 0 14px;
      font-size: var(--meta-size);
      font-weight: 600;
      background: var(--surface-soft);
      color: var(--text);
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: inherit;
    }

    .btn:hover {
      background: rgba(231, 233, 234, 0.08);
    }

    .btn.primary {
      border-color: var(--primary);
      background: var(--primary);
      color: #ffffff;
    }

    .btn.primary:hover {
      background: #188cd8;
    }

    .btn:disabled {
      opacity: 0.62;
      cursor: not-allowed;
    }

    .card {
      display: grid;
      gap: var(--space-16);
    }

    .field label {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: var(--meta-size);
      line-height: 1.6;
      font-weight: 500;
    }

    .field input,
    .field textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-soft);
      color: var(--text);
      font: inherit;
      padding: 10px 12px;
      outline: none;
    }

    .field textarea {
      min-height: 140px;
      resize: vertical;
    }

    .field input::placeholder,
    .field textarea::placeholder {
      color: var(--muted);
      opacity: 0.9;
    }

    .field input:focus,
    .field textarea:focus {
      border-color: rgba(29, 155, 240, 0.66);
      box-shadow: 0 0 0 1px rgba(29, 155, 240, 0.2);
    }

    .actions {
      display: flex;
      gap: var(--space-16);
      flex-wrap: wrap;
    }

    .status {
      min-height: 44px;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      color: var(--muted);
      font-size: var(--meta-size);
      line-height: 1.6;
      font-weight: 500;
      background: var(--surface-soft);
    }

    .status.ok {
      color: #d7ecff;
      border-color: rgba(29, 155, 240, 0.66);
      background: rgba(29, 155, 240, 0.14);
    }

    .status.err {
      color: #ffd5e8;
      border-color: rgba(249, 24, 128, 0.58);
      background: rgba(249, 24, 128, 0.14);
    }

    @media (max-width: 640px) {
      .shell {
        width: calc(100% - 24px);
        margin: var(--space-16) auto var(--space-24);
      }

      .top,
      .card {
        padding: var(--space-16);
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="top">
      <div>
        <h1>个人中心</h1>
        <p id="viewerText" class="sub">正在校验登录状态...</p>
      </div>
      <div class="nav">
        <a class="btn" href="/">返回站点</a>
        <a class="btn" href="/community.html">社区入口</a>
        <button id="logoutBtn" class="btn" type="button">退出登录</button>
      </div>
    </section>

    <section class="card">
      <h2>资料设置</h2>

      <div class="field">
        <label for="displayName">昵称</label>
        <input id="displayName" maxlength="32" placeholder="例如：小马Lenny" />
      </div>

      <div class="field">
        <label for="username">用户名（唯一）</label>
        <input id="username" maxlength="24" placeholder="例如：lenny_01" />
      </div>

      <div class="field">
        <label for="contact">联系方式</label>
        <input id="contact" maxlength="80" placeholder="微信 / QQ / 邮箱 / 电话" />
      </div>

      <div class="field">
        <label for="bio">个人简介</label>
        <textarea id="bio" maxlength="300" placeholder="介绍一下你自己、兴趣和擅长方向"></textarea>
      </div>

      <div class="actions">
        <button id="saveBtn" type="button" class="btn primary">保存资料</button>
      </div>

      <div id="status" class="status">请先完善你的资料</div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/profile.js"></script>
</body>
</html>
