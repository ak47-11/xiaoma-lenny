<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>个人中心 | xiaoma.cyou</title>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body class="app-page profile-page">
  <main class="shell">
    <section class="top">
      <div>
        <h1>个人中心</h1>
        <p id="viewerText" class="sub">正在校验登录状态...</p>
      </div>
      <div class="nav">
        <a class="btn" href="/">返回站点</a>
        <a class="btn" href="/community.html">社区入口</a>
        <button id="logoutBtn" class="btn" type="button">退出登录</button>
      </div>
    </section>

    <section class="card">
      <h2>资料设置</h2>

      <div class="field">
        <label for="displayName">昵称</label>
        <input id="displayName" maxlength="32" placeholder="例如：小马Lenny" />
      </div>

      <div class="field">
        <label for="username">用户名（唯一）</label>
        <input id="username" maxlength="24" placeholder="例如：lenny_01" />
      </div>

      <div class="field">
        <label for="contact">联系方式</label>
        <input id="contact" maxlength="80" placeholder="微信 / QQ / 邮箱 / 电话" />
      </div>

      <div class="field">
        <label for="bio">个人简介</label>
        <textarea id="bio" maxlength="300" placeholder="介绍一下你自己、兴趣和擅长方向"></textarea>
      </div>

      <div class="actions">
        <button id="saveBtn" type="button" class="btn primary">保存资料</button>
      </div>

      <div id="status" class="status">请先完善你的资料</div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/design-variants.js"></script>
  <script src="/js/profile.js"></script>
</body>
</html>
