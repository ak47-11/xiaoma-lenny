<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>个人中心 | xiaoma.cyou</title>
  <style>
    :root { --bg:#f7f9ff; --surface:#fff; --line:#dbe3f1; --text:#1e2a40; --muted:#687890; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:"IBM Plex Sans","PingFang SC","Microsoft YaHei",sans-serif; color:var(--text); background:var(--bg); }
    .container { width:min(900px,94%); margin:22px auto 40px; }
    .top { border:1px solid var(--line); border-radius:16px; background:var(--surface); padding:16px; display:flex; justify-content:space-between; align-items:center; gap:10px; }
    .top h1 { margin:0; font-size:24px; }
    .top p { margin:6px 0 0; color:var(--muted); font-size:13px; }
    .nav { display:flex; gap:8px; flex-wrap:wrap; }
    .nav a, .nav button { text-decoration:none; border:1px solid #cad5ea; background:#fff; color:#23314c; border-radius:999px; min-height:34px; padding:0 13px; font-weight:700; font-size:12px; display:inline-flex; align-items:center; cursor:pointer; }
    .card { margin-top:12px; border:1px solid var(--line); border-radius:16px; background:var(--surface); padding:16px; }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .field label { display:block; font-size:12px; color:#667794; margin-bottom:6px; }
    .field input, .field textarea { width:100%; border:1px solid #d4deee; border-radius:10px; padding:10px; font:inherit; color:var(--text); background:#fff; }
    .field textarea { min-height:120px; resize:vertical; }
    .actions { margin-top:12px; display:flex; gap:8px; }
    .primary { border:none; background:linear-gradient(100deg,#8cc8ff,#b8dcff); color:#22365a; border-radius:999px; min-height:38px; padding:0 16px; font-weight:800; cursor:pointer; }
    .status { margin-top:10px; border:1px solid var(--line); border-radius:10px; padding:9px 10px; color:var(--muted); font-size:13px; background:#fafcff; }
    .status.ok { color:#0e8f63; border-color:rgba(14,143,99,.3); background:rgba(14,143,99,.08); }
    .status.err { color:#b7303c; border-color:rgba(183,48,60,.3); background:rgba(183,48,60,.08); }
    @media (max-width: 760px) { .grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <main class="container">
    <section class="top">
      <div>
        <h1>个人中心</h1>
        <p id="viewerText">正在校验登录状态...</p>
      </div>
      <div class="nav">
        <a href="/">首页</a>
        <a href="/community.html">社区</a>
        <button id="logoutBtn" type="button">退出登录</button>
      </div>
    </section>

    <section class="card">
      <div class="grid">
        <div class="field">
          <label for="displayName">昵称</label>
          <input id="displayName" maxlength="32" placeholder="例如：小马Lenny" />
        </div>
        <div class="field">
          <label for="contact">联系方式</label>
          <input id="contact" maxlength="80" placeholder="微信 / QQ / 邮箱 / 电话" />
        </div>
      </div>
      <div class="field" style="margin-top:10px;">
        <label for="bio">个人简介</label>
        <textarea id="bio" maxlength="300" placeholder="介绍一下你自己、兴趣和擅长方向"></textarea>
      </div>
      <div class="actions">
        <button id="saveBtn" type="button" class="primary">保存资料</button>
      </div>
      <div id="status" class="status">请先完善你的资料</div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/profile.js"></script>
</body>
</html>
