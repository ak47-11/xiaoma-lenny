<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>管理台 | xiaoma.cyou</title>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <style>
    :root {
      --bg: #f7f9ff;
      --surface: #fff;
      --line: #dde3f0;
      --text: #1d2738;
      --muted: #65748a;
      --ok: #0c8d5f;
      --warn: #c8313e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "IBM Plex Sans", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(900px 440px at -10% -5%, rgba(126, 198, 255, 0.25), transparent 64%),
        radial-gradient(840px 420px at 108% -2%, rgba(255, 188, 163, 0.23), transparent 66%),
        var(--bg);
    }
    .container { width: min(1200px, 94%); margin: 24px auto 40px; }
    .top {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .title h1 { margin: 0; font-size: 24px; }
    .title p { margin: 6px 0 0; color: var(--muted); font-size: 13px; }
    .actions { display: flex; flex-wrap: wrap; gap: 8px; }
    button, .link-btn {
      border: 1px solid #ced7e8;
      background: #fff;
      color: #1f2e45;
      border-radius: 999px;
      min-height: 34px;
      padding: 0 13px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }
    .primary { background: linear-gradient(100deg, #8dc7ff, #b9dbff); border-color: #bdd7fc; }
    .danger { background: #fff2f4; border-color: #f7c6cf; color: #a72d39; }
    .status {
      margin-top: 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      padding: 10px;
      color: var(--muted);
      font-size: 13px;
    }
    .status.ok { color: var(--ok); border-color: rgba(12, 141, 95, 0.3); background: rgba(12, 141, 95, 0.08); }
    .status.err { color: var(--warn); border-color: rgba(200, 49, 62, 0.35); background: rgba(200, 49, 62, 0.08); }

    .grid {
      margin-top: 14px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 8px 20px rgba(96, 111, 145, 0.1);
    }
    .metric { font-size: 30px; font-weight: 800; margin-top: 2px; }
    .label { font-size: 12px; color: var(--muted); }

    .panels {
      margin-top: 14px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .head-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
    .head-row h2 { margin: 0; font-size: 18px; }
    .table-wrap { margin-top: 10px; border: 1px solid var(--line); border-radius: 12px; overflow: auto; background: #fff; }
    table { width: 100%; border-collapse: collapse; min-width: 600px; }
    th, td { font-size: 12px; border-bottom: 1px solid #ebeff7; padding: 9px 8px; text-align: left; vertical-align: top; }
    th { color: #596a88; font-weight: 700; background: #f8faff; }
    tr:last-child td { border-bottom: none; }
    .small { font-size: 11px; color: #73829c; }
    .role { min-height: 30px; border-radius: 8px; border: 1px solid #d5deed; padding: 0 8px; }

    @media (max-width: 980px) {
      .grid { grid-template-columns: 1fr; }
      .panels { grid-template-columns: 1fr; }
    }
  </style>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body class="app-page admin-page">
  <div class="container">
    <section class="top">
      <div class="title">
        <h1>社区管理台</h1>
        <p id="viewerText">正在验证登录状态...</p>
      </div>
      <div class="actions">
        <a class="link-btn" href="/">返回站点</a>
        <a class="link-btn" href="/community.html">社区入口</a>
        <button id="refreshBtn" class="primary">刷新数据</button>
        <button id="logoutBtn">退出登录</button>
      </div>
    </section>

    <div id="status" class="status">初始化中...</div>

    <section class="grid">
      <article class="card"><div class="label">帖子总数</div><div id="postCount" class="metric">-</div></article>
      <article class="card"><div class="label">评论总数</div><div id="commentCount" class="metric">-</div></article>
      <article class="card"><div class="label">用户总数</div><div id="userCount" class="metric">-</div></article>
      <article class="card"><div class="label">待审核条目</div><div id="queueCount" class="metric">-</div></article>
      <article class="card"><div class="label">操作日志数</div><div id="logCount" class="metric">-</div></article>
    </section>

    <section class="panels">
      <article class="card">
        <div class="head-row">
          <h2>帖子管理</h2>
          <span class="small">可删除违规/垃圾帖子</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>标题</th><th>作者</th><th>社区</th><th>时间</th><th>操作</th></tr>
            </thead>
            <tbody id="postTable"></tbody>
          </table>
        </div>
      </article>

      <article class="card">
        <div class="head-row">
          <h2>评论管理</h2>
          <span class="small">可删除违规评论</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>内容</th><th>作者</th><th>帖子ID</th><th>时间</th><th>操作</th></tr>
            </thead>
            <tbody id="commentTable"></tbody>
          </table>
        </div>
      </article>
    </section>

    <section class="panels">
      <article class="card">
        <div class="head-row">
          <h2>敏感词审核队列</h2>
          <span class="small">驳回或放行命中内容</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>内容摘要</th><th>原因</th><th>提交者</th><th>时间</th><th>操作</th></tr>
            </thead>
            <tbody id="queueTable"></tbody>
          </table>
        </div>
      </article>

      <article class="card">
        <div class="head-row">
          <h2>管理员操作日志</h2>
          <span class="small">记录删帖/删评/改角色/审核操作</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>操作者</th><th>动作</th><th>对象</th><th>详情</th><th>时间</th></tr>
            </thead>
            <tbody id="logTable"></tbody>
          </table>
        </div>
      </article>
    </section>

    <section class="panels">
      <article class="card" style="grid-column: 1 / -1;">
        <div class="head-row">
          <h2>用户角色管理</h2>
          <span class="small">支持 admin / moderator / user</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>用户ID</th><th>显示名</th><th>角色</th><th>操作</th></tr>
            </thead>
            <tbody id="userTable"></tbody>
          </table>
        </div>
      </article>
    </section>
  </div>
