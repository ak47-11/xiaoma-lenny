<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>M 发布中心 | 个人页</title>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body class="app-page hub-page page-m">
  <main class="hub-shell">
    <header class="hub-top">
      <div class="hub-brand">
        <strong>M 发布中心</strong>
        <span>个人页面 · 发布与管理我的动态</span>
      </div>
      <nav class="hub-nav">
        <a class="pill m is-current" href="/m.html">M 公共社区</a>
        <a class="pill mi" href="/mi.html">Mi</a>
        <a class="pill lenny" href="/lenny.html">Lenny</a>
        <a href="/">社区入口</a>
        <a href="/profile.html" id="profileNav" style="display:none">我的资料</a>
        <a href="/admin.html" id="adminNav" style="display:none">控制台</a>
        <a href="/auth.html" id="loginNav">账号入口</a>
        <a href="#" id="logoutNav" style="display:none">退出账号</a>
      </nav>
    </header>

    <section class="hub-layout">
      <aside class="panel panel-left">
        <h3>页面说明</h3>
        <div class="hint">这是你的个人发布页，和公开社区分开。公开浏览请回到 M 公共社区页面。</div>
        <div class="actions" style="margin-top:10px;">
          <a href="/m.html">返回公开社区</a>
        </div>
      </aside>

      <section class="panel panel-main">
        <h2>发布动态</h2>
        <p id="userHint" class="muted" style="margin:0 0 8px;">正在验证登录状态...</p>

        <form id="mComposer">
          <div class="field">
            <label for="mContent">内容（最多 280 字）</label>
            <textarea id="mContent" maxlength="280" placeholder="你现在在想什么？分享你的观点、进展或灵感。"></textarea>
            <div id="mCounter" class="counter">0 / 280</div>
          </div>
          <div class="field">
            <label for="mMedia">图片/视频链接（可选）</label>
            <input id="mMedia" maxlength="500" placeholder="https://..." />
          </div>
          <div style="margin-top:10px;">
            <button class="action-btn" type="submit">发布动态</button>
          </div>
        </form>

        <div id="mStatus" class="status">准备就绪</div>

        <h3 style="margin-top:12px;">我的动态</h3>
        <div id="mMineFeed" class="feed-list"></div>
      </section>

      <aside class="panel panel-right">
        <h3>管理建议</h3>
        <ul class="list-text">
          <li>优先保持观点清晰，避免过长段落</li>
          <li>公共内容默认可被所有用户查看</li>
          <li>发布后可在下方列表里管理删除</li>
        </ul>
      </aside>
    </section>
  </main>

  <template id="mMinePostTemplate">
    <article class="post">
      <div class="post-head">
        <div>
          <strong class="title"></strong>
          <div class="meta"></div>
        </div>
        <span class="chip">我的动态</span>
      </div>
      <p class="body-text"></p>
      <div class="media-preview"></div>
      <div class="actions">
        <span class="chip stat-chip">👍 <span class="like-count">0</span></span>
        <span class="chip stat-chip">🔁 <span class="repost-count">0</span></span>
        <span class="chip stat-chip">💬 <span class="comment-count">0</span></span>
        <button class="delete-btn">删除</button>
      </div>
    </article>
  </template>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/app-core.js"></script>
  <script src="/js/m-publish.js"></script>
</body>
</html>
