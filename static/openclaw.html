<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OpenClaw 对话 | xiaoma.cyou</title>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body class="app-page openclaw-page">
  <main class="chat-shell">
    <aside class="sidebar">
      <div class="brand">
        <strong>OpenClaw Chat</strong>
        <span>本地算力 · 站点代理</span>
      </div>

      <div class="action-stack">
        <button id="newChatBtn" class="btn primary" type="button">+ 新对话</button>
        <button id="configBtn" class="btn" type="button">接口设置</button>
        <a class="btn" href="/">返回门户</a>
      </div>

      <div class="config-card">
        <strong>当前配置</strong>
        <p id="modelHint" class="hint">模型：openclaw-agent · 未配置鉴权</p>
      </div>

      <div class="threads-head">
        <strong>历史会话</strong>
        <span>本地保存</span>
      </div>

      <ul id="threadList" class="thread-list"></ul>
    </aside>

    <section class="main">
      <header class="topbar">
        <div>
          <h1>OpenClaw 新界面</h1>
          <p>参考 ChatGPT 的会话布局：左侧管理会话，右侧进行多轮对话，底部输入并发送。</p>
        </div>
        <button id="clearChatBtn" class="btn" type="button">清空当前对话</button>
      </header>

      <div id="chatFeed" class="chat-feed"></div>

      <form id="composerForm" class="composer">
        <textarea id="promptInput" maxlength="5000" placeholder="输入你的问题，Enter 发送，Shift + Enter 换行。"></textarea>
        <div class="composer-row">
          <span class="composer-tip">提示：首次使用请先点“接口设置”，填写模型与 Bridge Token。</span>
          <button id="sendBtn" class="btn primary" type="submit">发送</button>
        </div>
      </form>
    </section>
  </main>

  <script src="/js/openclaw-chat.js"></script>
  <script src="/js/design-variants.js"></script>
</body>
</html>
